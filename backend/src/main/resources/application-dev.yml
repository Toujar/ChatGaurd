# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3306/chatguard_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    com.chatguard: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

jwt:
  secret: dev-secret-key-for-development-only-do-not-use-in-production-minimum-32-chars

server:
  port: 8080
